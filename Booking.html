  <!-- Form -->
    <h1 style="text-align: center;color: bisque;">Booking form</h1>
    <div class="adjust">
    <form id="bookingForm" onsubmit="return validateAndSubmitForm();" action="form.php" method="post">
        <label for="customerName">Full-Name:</label>
        <input type="text" id="customerName" name="customerName" required>
    
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>
    
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>
    
        <div class="sameline">
            <label for="checkInDate">Check-in Date:</label>
            <input type="date" id="checkInDate" name="checkInDate" required>
    
            <label for="roomType">Room Type:</label>
            <select id="roomType" name="roomType" required>
                <!-- Room Types -->
                <option value="1">Standard Twin</option>
                <option value="2">Executive Twin</option>
                <option value="3">Superior Twin</option>
                <option value="4">Deluxe Suite</option>
                <option value="5">Executive Suite</option>
                <option value="6">Presidential Suite</option>
            </select>
        </div>
    
        <label for="numOfPersons">Number of Check-in Persons:</label>
        <input type="number" id="numOfPersons" name="numOfPersons" min="1" required>
    
        <input type="submit" value="Submit Booking" id="submitform">
    </form>
  </div>
